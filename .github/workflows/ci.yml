# .github/workflows/ci.yml
# Pipeline de CI/CD para CasaBot AI

name: CI/CD Pipeline

# Cuándo ejecutar este workflow
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Los trabajos a ejecutar
jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    
    steps:
      # 1. Descargar el código del repositorio
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # 2. Configurar Python
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      
      # 3. Instalar dependencias
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. Ejecutar tests con pytest
      - name: 🧪 Run pytest
        run: |
          pytest tests/ -v --tb=short
      
      # 5. (Opcional) Reportar cobertura de código
      - name: 📊 Code coverage
        run: |
          pip install pytest-cov
          pytest tests/ --cov=app --cov-report=xml
      
      # 6. (Opcional) Security scan de dependencias
      - name: 🔒 Security scan
        run: |
          pip install safety
          safety check -r requirements.txt --json || true

