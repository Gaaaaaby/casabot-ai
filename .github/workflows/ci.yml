# .github/workflows/ci.yml
# Pipeline de CI/CD para CasaBot AI

name: CI/CD Pipeline

# Cuándo ejecutar este workflow
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Los trabajos a ejecutar
jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    
    steps:
      # 1. Descargar el código del repositorio
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # 2. Configurar Python
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      
      # 3. Instalar dependencias
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. Entrenar el modelo
      - name: 🧠 Train model
        run: |
          python app/train_model.py
      
      # 5. Verificar que el modelo se creó
      - name: ✅ Verify model exists
        run: |
          ls -la models/
          test -f models/house_model.joblib
      
      # 6. Ejecutar tests con pytest
      - name: 🧪 Run pytest
        run: |
          pytest tests/ -v --tb=short
      
      # 7. (Opcional) Reportar cobertura de código
      - name: 📊 Code coverage
        run: |
          pip install pytest-cov
          pytest tests/ --cov=app --cov-report=xml
      
      # 8. Security scan de dependencias
      - name: 🔒 Security scan
        run: |
          pip install safety
          safety check -r requirements.txt --json || true

  # 🆕 TRABAJO DE DEPLOY CON SECRETS
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: test  # ← Solo se ejecuta si 'test' pasa ✅
    if: github.ref == 'refs/heads/main'  # ← Solo en rama main
    environment: production  # ← Entorno de producción
    
    steps:
      # 1. Descargar el código
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      # 2. Deploy a Render (usando secrets)
      - name: 🚀 Trigger Render Deploy
        run: |
          echo "🔐 Usando secret: DEPLOY_TOKEN (oculto en logs)"
          curl -X POST "${{ secrets.RENDER_DEPLOY_URL }}" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"dryRun": false}'
        
        # Si aún no tienes Render configurado, usa este echo temporal:
        # run: |
        #   echo "✅ Deploy simulado exitoso"
        #   echo "🔐 Secret inyectado: ${{ secrets.RENDER_API_KEY }}"
        #   echo "⚠️ En producción, esto llamaría a la API de Render"
      
      # 3. Verificar deploy (opcional)
      - name: ✅ Verify Deploy
        run: |
          echo "🌐 API debería estar disponible en: https://casabot-api.onrender.com"
          echo "📊 Health check: https://casabot-api.onrender.com/salud"